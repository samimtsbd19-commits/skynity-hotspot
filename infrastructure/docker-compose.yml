services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-skynity}
      POSTGRES_USER: ${POSTGRES_USER:-skynity_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-skynity_pass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./radius/sql/schema.sql:/docker-entrypoint-initdb.d/01-radius.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-skynity_user} -d ${POSTGRES_DB:-skynity}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - skynity

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_pass}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - skynity

  freeradius:
    image: freeradius/freeradius-server:3.2-alpine
    volumes:
      - ./radius/config:/etc/freeradius/3.0
    ports:
      - "1812:1812/udp"
      - "1813:1813/udp"
    depends_on:
      - postgres
    networks:
      - skynity

  api:
    build:
      context: ../
      dockerfile: apps/api/Dockerfile
    env_file: ../.env
    ports:
      - "3001:3001"
    volumes:
      - ../uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - skynity

  web:
    build:
      context: ../
      dockerfile: apps/web/Dockerfile
    env_file: ../.env
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - skynity

  wireguard:
    image: linuxserver/wireguard:latest
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    ports:
      - "51820:51820/udp"
    volumes:
      - ./wireguard:/config
      - /lib/modules:/lib/modules:ro
    sysctls:
      - net.ipv4.ip_forward=1
    networks:
      - skynity

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - ../hotspot-portal:/srv/hotspot
    depends_on:
      - web
      - api
    networks:
      - skynity

volumes:
  postgres_data:
  redis_data:
  caddy_data:

networks:
  skynity:
    driver: bridge
